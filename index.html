    // --- FIREBASE LOGIC ---
    auth.onAuthStateChanged(user => {
      currentUser = user;
      if (user) {
        loadUserData(user.uid);
      } else {
        renderAuthUI();
        renderMenuCards();
      }
    });

    function login() {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithRedirect(provider);
    }

    function logout() {
      auth.signOut().then(() => location.reload());
    }

    function loadUserData(uid) {
      db.ref('users/' + uid).once('value').then(snapshot => {
        const data = snapshot.val();
        if (data && data.scores) {
          userScores = data.scores;
          totalScore = data.totalScore || 0;
        }
        renderAuthUI();
        renderMenuCards();
      });
    }

    function saveProgress(bookId, bookScore) {
      if (!currentUser) return;
      
      userScores[bookId] = Math.max(userScores[bookId] || 0, bookScore);
      totalScore = Object.values(userScores).reduce((a, b) => a + b, 0);

      db.ref('users/' + currentUser.uid).set({
        username: currentUser.displayName,
        photo: currentUser.photoURL,
        scores: userScores,
        totalScore: totalScore
      });

      db.ref('leaderboard/' + currentUser.uid).set({
        username: currentUser.displayName,
        score: totalScore,
        photo: currentUser.photoURL
      });

      renderAuthUI();
    }

              <p class="text-sm ${b.color}">${b.author}</p>
              
              <div class="mt-4 flex items-center justify-between">
                <p class="text-xs text-white/60">📍 ${b.qCount} вопросов</p>
                ${bestScore > 0 ? `<p class="text-xs font-bold text-amber-400">Пройдено: ${bestScore}/${b.qCount}</p>` : ''}
              </div>
              
              <p class="text-white/80 text-sm mt-4 border-t border-white/10 pt-3" style="font-family: 'Source Sans Pro', sans-serif;">
                ${b.desc}
              </p>
            </div>
          </button>
        `;
      }).join('');
    }

    function showLeaderboard() {
      document.getElementById('main-menu').classList.add('hidden');
      document.getElementById('quiz-wrapper').classList.add('hidden');
      const lbSection = document.getElementById('leaderboard-section');
      lbSection.classList.remove('hidden');

      const list = document.getElementById('leaderboard-list');
      list.innerHTML = '<div class="text-center py-4">Загрузка...</div>';

      db.ref('leaderboard').orderByChild('score').limitToLast(10).once('value').then(snapshot => {
        let html = '';
        const data = [];
        snapshot.forEach(child => { data.unshift(child.val()); });

        if(data.length === 0) {
           list.innerHTML = '<div class="text-center py-4 opacity-50">Пока никого нет. Стань первым!</div>';
           return;
        }

        data.forEach((p, i) => {
          html += `
            <div class="flex items-center gap-4 p-3 rounded-xl bg-white/5 border border-white/5 hover:bg-white/10 transition">
              <span class="w-6 text-center font-bold text-amber-400">${i+1}</span>
              <img src="${p.photo}" class="w-10 h-10 rounded-full">
              <span class="flex-1 font-semibold">${p.username}</span>
              <span class="bg-amber-500/20 text-amber-400 px-3 py-1 rounded-lg font-bold">${p.score} 🌍</span>
            </div>
          `;
        });
        list.innerHTML = html;
      });
    }

    function showMenu() {
      document.getElementById('leaderboard-section').classList.add('hidden');
      document.getElementById('quiz-wrapper').classList.add('hidden');
      document.getElementById('main-menu').classList.remove('hidden');
      
      document.getElementById('app-wrapper').className = "quiz-bg min-h-full w-full p-4 md:p-8 flex flex-col items-center";
      renderMenuCards();
    }

    // --- ЛОГИКА ИГРЫ С ПЕРЕМЕШИВАНИЕМ ОТВЕТОВ ---
    function startQuizFromBook(bookIndex) {
      startingBook = bookIndex;
      currentQuestion = bookStarts[bookIndex];
      score = 0;
      answered = false;
      
      const start = bookStarts[bookIndex];
      const end = bookEnds[bookIndex];
      for (let i = start; i <= end; i++) {
        const q = questions[i];
        // Запоминаем правильный ответ по тексту
        const correctText = q.answers[q.correct];
        // Перемешиваем массив ответов
        q.answers = [...q.answers].sort(() => Math.random() - 0.5);
        // Находим, на каком месте теперь правильный ответ, и обновляем индекс
        q.correct = q.answers.indexOf(correctText);
      }
      
      document.getElementById('main-menu').classList.add('hidden');
      document.getElementById('leaderboard-section').classList.add('hidden');
      document.getElementById('quiz-wrapper').classList.remove('hidden');
      
      document.getElementById('score-text').textContent = 'Счёт: 0';
      document.getElementById('progress-bar').style.width = '0%';
      
      const themes = ['robinson-theme', 'grant-theme', 'nemo-theme', 'valikhanov-theme'];
      document.getElementById('app-wrapper').className = `quiz-bg ${themes[bookIndex]} min-h-full w-full p-4 md:p-8 flex flex-col items-center`;

      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      const container = document.getElementById('quiz-container');
      
      container.innerHTML = `
        <div class="fade-in">
          <div class="flex items-center justify-between mb-4 pb-4 border-b border-white/10">
            <div class="flex items-center gap-3">
              <span class="text-3xl">📚</span>
              <div>
                <div class="text-amber-400 font-semibold" style="font-family: 'Playfair Display', serif;">${q.book}</div>
                <div class="text-white/60 text-sm">${q.author}</div>
              </div>
            </div>
            <button onclick="showMenu()" class="text-sm opacity-50 hover:opacity-100 transition">✕ Закрыть</button>
          </div>
          
          <div class="mb-6 p-4 rounded-lg bg-white/5 border border-white/10">
            <p class="text-white/80 text-sm leading-relaxed whitespace-pre-wrap" style="font-family: 'Source Sans Pro', sans-serif;">${q.preText}</p>
          </div>
          
          <p class="text-lg md:text-xl text-white mb-6 leading-relaxed font-semibold" style="font-family: 'Source Sans Pro', sans-serif;">
            ${q.text}
          </p>
          
          <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
              <p class="text-xs text-white/50 mb-2 pl-1">Иллюстрация</p>
              <div class="w-full rounded-lg border border-white/10 overflow-hidden bg-white/5" style="height: 180px;">
                ${q.illustration}
              </div>
            </div>
            <div>
              <p class="text-xs text-white/50 mb-2 pl-1">Карта</p>
              <div class="w-full rounded-lg border border-white/10 overflow-hidden bg-white/5" style="height: 180px;">
                ${q.map}
              </div>
            </div>
          </div>
          
          <div class="space-y-3" id="answers-container">
            ${q.answers.map((answer, index) => `
              <button onclick="selectAnswer(${index})" class="answer-btn w-full text-left px-5 py-4 rounded-xl text-white font-medium transition-all" style="font-family: 'Source Sans Pro', sans-serif;">
                <span class="inline-block w-8 h-8 rounded-full bg-white/10 text-center leading-8 mr-3 text-amber-400 font-bold">${String.fromCharCode(65 + index)}</span>
                ${answer}
              </button>
            `).join('')}
          </div>
          
          <div id="explanation" class="hidden mt-6 p-4 rounded-xl bg-white/5 border border-white/10">
            <div class="flex items-start gap-3">
              <span class="text-2xl">💡</span>
              <p class="text-white/80 text-sm leading-relaxed" style="font-family: 'Source Sans Pro', sans-serif;">${q.explanation}</p>
            </div>
          </div>
          
          <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-6 py-4 rounded-xl bg-gradient-to-r from-amber-500 to-amber-600 text-slate-900 font-bold text-lg transition-all hover:from-amber-400 hover:to-amber-500 shadow-xl">
            Следующий вопрос →
          </button>
        </div>
      `;
      updateProgress();
    }

    function selectAnswer(index) {
      if (answered) return;
      answered = true;
      
      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll('.answer-btn');
      
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) {
          btn.classList.add('correct');
        } else if (i === index && index !== q.correct) {
          btn.classList.add('incorrect');
        } else {
          btn.style.opacity = '0.5';
        }
      });
      
      if (index === q.correct) {
        score++;
        document.getElementById('score-text').textContent = `Счёт: ${score}`;
      }
      
      document.getElementById('explanation').classList.remove('hidden');
      document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
      currentQuestion++;
      answered = false;
      if (currentQuestion <= bookEnds[startingBook]) {
        renderQuestion();
      } else {
        showResults();
      }
    }

    function updateProgress() {
      const bookStart = bookStarts[startingBook];
      const bookLength = bookEnds[startingBook] - bookStart + 1;
      const localQuestion = currentQuestion - bookStart;
      const progress = (localQuestion / bookLength) * 100;
      
      document.getElementById('progress-bar').style.width = `${progress}%`;
      document.getElementById('progress-text').textContent = `Вопрос ${localQuestion + 1} из ${bookLength}`;
    }

    function showResults() {
      const bookLength = bookEnds[startingBook] - bookStarts[startingBook] + 1;
      const percentage = Math.round((score / bookLength) * 100);
      const container = document.getElementById('quiz-container');
      
      saveProgress(startingBook, score);

      let emoji, message;
      if (percentage >= 85) { emoji = '🏆'; message = 'Превосходно! Вы настоящий знаток географии!'; } 
      else if (percentage >= 60) { emoji = '🌟'; message = 'Отлично! У вас хорошие знания!'; } 
      else if (percentage >= 40) { emoji = '📖'; message = 'Неплохо! Есть куда расти.'; } 
      else { emoji = '🗺️'; message = 'Стоит перечитать классику и изучить карты!'; }
      
      container.innerHTML = `
        <div class="text-center fade-in py-8">
          <div class="text-7xl mb-6">${emoji}</div>
          <h2 class="text-3xl font-bold text-white mb-4" style="font-family: 'Playfair Display', serif;">Книга пройдена!</h2>
          <p class="text-xl text-amber-400 mb-2 font-semibold">Ваш результат: ${score} из ${bookLength}</p>
          <div class="w-32 h-32 mx-auto my-6 rounded-full bg-gradient-to-br from-amber-400 to-amber-600 flex items-center justify-center shadow-lg shadow-amber-500/20">
            <span class="text-4xl font-bold text-slate-900">${percentage}%</span>
          </div>
          <p class="text-white/80 mb-8">${message}</p>
          <button onclick="showMenu()" class="px-8 py-4 rounded-xl bg-gradient-to-r from-amber-500 to-amber-600 text-slate-900 font-bold text-lg transition-all hover:scale-105 w-full">
            Вернуться в меню
          </button>
        </div>
      `;
      document.getElementById('progress-bar').style.width = '100%';
      document.getElementById('progress-text').textContent = 'Завершено';
    }
  </script>
</body>
</html>
